<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Web Search</title></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (data, secret) => {
  try {
    const input = JSON.parse(data);
    const { query } = input;
    const apiKey = secret || "";

    if (!apiKey.trim()) {
      return JSON.stringify({ error: "Serper API key missing." });
    }

    if (!query || !query.trim()) {
      return JSON.stringify({ error: "No search query provided." });
    }

    const result = await searchWeb(query.trim(), apiKey);
    return JSON.stringify(result);

  } catch (e) {
    return JSON.stringify({ error: "Script error: " + e.message });
  }
};

async function searchWeb(query, apiKey) {
  const response = await fetch("https://google.serper.dev/search", {
    method: "POST",
    headers: {
      "X-API-KEY": apiKey,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ q: query, gl: "in", hl: "en" }),
  });

  if (!response.ok) {
    return { error: "Serper API error: HTTP " + response.status };
  }

  const data = await response.json();
  return extractData(data, query);
}

function extractData(data, query) {
  const result = { query, answerBox: null, knowledgeGraph: null, organic: [] };

  const ab = data.answerBox || {};
  const abText = ab.answer || ab.snippet || ab.title || null;
  if (abText) result.answerBox = { text: abText.trim(), source: ab.link || null };

  const kg = data.knowledgeGraph || {};
  if (kg.description) result.knowledgeGraph = { title: kg.title || null, text: kg.description.trim() };

  result.organic = (data.organic || []).slice(0, 3)
    .map(item => ({ title: item.title || "", snippet: item.snippet || "", url: item.link || "" }))
    .filter(item => item.snippet);

  if (!result.answerBox && !result.knowledgeGraph && !result.organic.length) {
    return { error: "No results found. Please rephrase your question." };
  }

  return result;
}
</script>
</body>
</html>
