<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Search</title>
  </head>
  <body>
    <script>
      // ⚠️ Replace with your Serper API key from serper.dev
      const SERPER_API_KEY = 'YOUR_SERPER_API_KEY_HERE';

      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          const query = jsonData.query;

          if (!query) {
            return JSON.stringify({ error: 'No search query provided.' });
          }

          const response = await fetch('https://google.serper.dev/search', {
            method: 'POST',
            headers: {
              'X-API-KEY': SERPER_API_KEY,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ q: query, gl: 'in', hl: 'en' }),
          });

          if (!response.ok) {
            return JSON.stringify({ error: `Serper API error: HTTP ${response.status}` });
          }

          const result = await response.json();
          let answer = null;
          const sources = [];

          // 1. Answer Box (highest priority)
          const ab = result.answerBox || {};
          const abText = ab.answer || ab.snippet || ab.title || null;
          if (abText) {
            answer = abText.trim();
            if (ab.link) sources.push(ab.link);
          }

          // 2. Knowledge Graph
          if (!answer && result.knowledgeGraph && result.knowledgeGraph.description) {
            answer = result.knowledgeGraph.description.trim();
          }

          // 3. Organic snippets top 3
          const organic = (result.organic || []).slice(0, 3).map(item => ({
            title: item.title || '',
            snippet: item.snippet || '',
            url: item.link || '',
          })).filter(item => item.snippet);

          if (!answer && organic.length === 0) {
            return JSON.stringify({ error: 'No results found. Please rephrase your question.' });
          }

          return JSON.stringify({ query, answer, organic, sources });

        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Failed to search: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
